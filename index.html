<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia IUTIRLA: Tesoros de Bolívar</title>
    
    
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --primario: #005f73; --acento: #f1b92c; --fondo: #c3262f; --exito: #2ecc71; --error: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .cintillo { width: 100%; max-width: 500px; margin-bottom: 15px; text-align: center; }
        .cintillo img { max-width: 90%; height: auto; border-radius: 8px; }
        #quiz-container { background: white; padding: 1.2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); max-width: 450px; width: 100%; text-align: center; box-sizing: border-box; }
        .contenedor-imagen { width: 100%; height: 180px; background: #eee; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border: 3px solid var(--primario); display: flex; align-items: center; justify-content: center; }
        .img-trivia { width: 100%; height: 100%; object-fit: cover; }
        .opcion { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #eee; border-radius: 10px; background: #f9f9f9; cursor: pointer; font-size: 0.95rem; transition: 0.2s; text-align: left; font-weight: 600; box-sizing: border-box; }
        .correcto { background-color: var(--exito) !important; color: white; border-color: #27ae60; }
        .incorrecto { background-color: var(--error) !important; color: white; border-color: #c0392b; }
        .btn-accion { padding: 12px 30px; background: var(--acento); color: white; border: none; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; width: 100%; max-width: 250px; }
        input { padding: 12px; width: 100%; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        .tabla-contenedor { max-height: 200px; overflow-y: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primario); color: white; padding: 8px; font-size: 0.8rem; position: sticky; top: 0; }
        td { padding: 8px; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .oculto { display: none; }
        .bloqueado { pointer-events: none; opacity: 0.6; }
    </style>
</head>
<body>

<div class="cintillo">
    <img src="iutirla.jpg" alt="IUTIRLA" onerror="this.style.display='none'">
</div>

<div id="quiz-container">
    <div id="pantalla-inicio">
        <h1>🏔️ Trivia De Bolívar</h1>
        <div class="contenedor-imagen">
            <img src="portada.jpg" class="img-trivia" onerror="this.src='https://placeholder.com'">
        </div>
        <p>Ingresa tu nombre para comenzar:</p>
        <input type="text" id="nombre-usuario" placeholder="Nombre y Apellido">
        <button class="btn-accion bloqueado" id="btn-comenzar" disabled>Cargando servidor...</button>
    </div>

    <div id="juego" class="oculto">
        <p id="num-pregunta" style="color:var(--primario); font-weight:bold; font-size: 0.8rem; margin:0;"></p>
        <div class="contenedor-imagen" id="contenedor-foto"></div>
        <h2 id="enunciado"></h2>
        <div id="opciones-lista"></div>
    </div>

    <div id="pantalla-final" class="oculto">
        <h3>🏆 Ranking Global (Top 4)</h3>
        <p id="resultado-final" style="font-size: 1.5rem; color: var(--primario); font-weight: bold; margin: 5px 0;"></p>
        <div class="tabla-contenedor">
            <table>
                <thead><tr><th>#</th><th>Jugador</th><th>Pts</th></tr></thead>
                <tbody id="lista-ranking"></tbody>
            </table>
        </div>
        <br>
        <button class="btn-accion" onclick="location.reload()">🔄 Reiniciar Juego</button>
    </div>
</div>

<script>
    
    window.addEventListener('load', function() {
        
        if (typeof firebase === 'undefined') {
            document.getElementById("btn-comenzar").innerText = "Error de conexión";
            alert("No se pudo conectar con Firebase. Revisa tu internet o el bloqueo de red.");
            return;
        }

        
        const firebaseConfig = {
            apiKey: "AIzaSyCyRgck7A2wAoWEd8WrkI1HUOv4rjubSWo",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "trivia-bolivar",
            storageBucket: "trivia-bolivar.firebasestorage.app",
            messagingSenderId: "1046239380884",
            appId: "1:1046239380884:web:596a91edb4f22358957b81"
        };

       
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        
        const btnComenzar = document.getElementById("btn-comenzar");
        btnComenzar.innerText = "¡Comenzar!";
        btnComenzar.classList.remove("bloqueado");
        btnComenzar.disabled = false;

        const bancoPreguntas = [
            { q: "¿Cuál es la caída de agua más alta del mundo ubicada en Canaima?", options: ["Salto Kukenán", "Salto Ángel", "Salto La Llovizna"], correct: "Salto Ángel", img: "angel.jpg" },
            { q: "¿En qué ciudad se encuentra el imponente Parque Cachamay?", options: ["Ciudad Bolívar", "Upata", "Ciudad Guayana"], correct: "Ciudad Guayana", img: "cachamay.jpg" },
            { q: "¿Qué tepuy es famoso por ser llamado 'El Mundo Perdido'?", options: ["Monte Roraima", "Cerro Autana", "Auyantepui"], correct: "Monte Roraima", img: "roraima.jpg" },
            { q: "¿Qué fortificaciones coloniales protegen la entrada por el río Orinoco?", options: ["Castillo de San Carlos", "Castillos de Guayana", "Fortín Solano"], correct: "Castillos de Guayana", img: "castillos.jpg" },
            { q: "¿Cómo se llama la unión de los ríos Orinoco y Caroní?", options: ["El Abrazo de los Ríos", "Boca de Serpiente", "Confluencia Caroní-Orinoco"], correct: "Confluencia Caroní-Orinoco", img: "confluencia.jpg" },
            { q: "¿Cuál es el pez emblemático que tiene su feria en Ciudad Bolívar?", options: ["Curbina", "Sapoara", "Bocachico"], correct: "Sapoara", img: "sapoara.jpg" },
            { q: "¿Qué artista cinético tiene un museo en Ciudad Bolívar?", options: ["Carlos Cruz-Diez", "Alejandro Otero", "Jesús Soto"], correct: "Jesús Soto", img: "soto.jpg" },
            { q: "¿Cómo se llama el puente que cruza el Orinoco en Ciudad Bolívar?", options: ["Puente Angostura", "Puente Orinoquia", "Puente Rafael Urdaneta"], correct: "Puente Angostura", img: "puente.jpg" },
            { q: "¿En qué población se celebran los carnavales Patrimonio de la Humanidad?", options: ["Guasipati", "Tumeremo", "El Callao"], correct: "El Callao", img: "callao.jpg" },
            { q: "¿Cuál es el fruto seco típico con el que se hacen turrones?", options: ["Maní", "Merey", "Nuez de Barinas"], correct: "Merey", img: "merey.jpg" },
            { q: "¿Qué lugar de la Gran Sabana tiene piso de piedra roja?", options: ["Quebrada del Jaspe", "Salto Aponguao", "Velo de la Novia"], correct: "Quebrada del Jaspe", img: "jaspe.jpg" },
            { q: "¿Cómo se llama la central hidroeléctrica más grande de Venezuela?", options: ["Macagua", "Guri", "Caruachi"], correct: "Guri", img: "guri.jpg" },
            { q: "¿Qué etnia indígena habita principalmente en Canaima?", options: ["Pemón", "Yanomami", "Warao"], correct: "Pemón", img: "pemon.jpg" },
            { q: "¿En qué casa histórica se redactó el Discurso de Angostura?", options: ["Casa de las Doce Ventanas", "Congreso de Angostura", "Casa San Isidro"], correct: "Congreso de Angostura", img: "congreso.jpg" },
            { q: "¿Qué dulce tradicional se prepara con yuca y papelón?", options: ["Naiboa", "Majarete", "Jalea de Mango"], correct: "Naiboa", img: "naiboa.jpg" },
            { q: "¿En qué parque se encuentra este salto?", options: ["Parque Cachamay", "Parque La Llovizna", "Parque Loefling"], correct: "Parque La Llovizna", img: "llovizna.jpg" },
            { q: "¿Qué CC tiene forma de pirámide en Pto. Ordaz?", options: ["Orinokia Mall", "CC Altavista", "Babilonia"], correct: "Orinokia Mall", img: "orinokia.jpg" },
            { q: "¿Cuál es el museo interactivo junto a Central Macagua?", options: ["Museo Jesús Soto", "Ecomuseo del Caroní", "Museo de Guayana"], correct: "Ecomuseo del Caroní", img: "ecomuseo.jpg" },
            { q: "¿En qué sector de San Félix fue la batalla?", options: ["Dalla Costa", "El Roble", "Chirica"], correct: "Chirica", img: "chirica.jpg" },
            { q: "¿Qué parque de Pto. Ordaz es un zoológico de fauna regional?", options: ["Parque La Navidad", "Parque Loefling", "Parque La Fundación"], correct: "Parque Loefling", img: "loefling.jpg" }
        ];

        let preguntas = [];
        let indice = 0, puntaje = 0, nombre = "";

        function barajar(array) {
            let n = [...array];
            for (let i = n.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [n[i], n[j]] = [n[j], n[i]];
            }
            return n;
        }

        btnComenzar.onclick = function() {
            nombre = document.getElementById("nombre-usuario").value.trim();
            if (!nombre) return alert("¡Dinos tu nombre!");

            preguntas = barajar([...bancoPreguntas]);
            preguntas.forEach(p => p.options = barajar([...p.options]));

            document.getElementById("pantalla-inicio").classList.add("oculto");
            document.getElementById("juego").classList.remove("oculto");
            mostrarPregunta();
        };

        function mostrarPregunta() {
            const p = preguntas[indice];
            document.getElementById("num-pregunta").innerText = `PREGUNTA ${indice + 1} / ${preguntas.length}`;
            document.getElementById("enunciado").innerText = p.q;
            document.getElementById("contenedor-foto").innerHTML = `<img src="${p.img}" class="img-trivia" onerror="this.src='https://placeholder.com'">`;
            
            const lista = document.getElementById("opciones-lista");
            lista.innerHTML = "";
            lista.classList.remove("bloqueado");

            p.options.forEach((opt) => {
                const b = document.createElement("button");
                b.innerText = opt; b.className = "opcion";
                b.onclick = function() {
                    lista.classList.add("bloqueado");
                    if(opt === p.correct) { 
                        b.classList.add("correcto"); 
                        puntaje += 100; 
                    } else { 
                        b.classList.add("incorrecto");
                        Array.from(lista.children).forEach(btn => {
                            if(btn.innerText === p.correct) btn.classList.add("correcto");
                        });
                    }
                    setTimeout(() => { 
                        indice++; 
                        (indice < preguntas.length) ? mostrarPregunta() : finalizar(); 
                    }, 800);
                };
                lista.appendChild(b);
            });
        }

        function finalizar() {
            document.getElementById("juego").classList.add("oculto");
            document.getElementById("pantalla-final").classList.remove("oculto");
            document.getElementById("resultado-final").innerText = puntaje + " Puntos";
            database.ref('ranking').push({ nombre, pts: puntaje, fecha: Date.now() });
            cargarRanking();
        }

        function cargarRanking() {
            database.ref('ranking').orderByChild('pts').limitToLast(50).on('value', s => {
                let arr = []; s.forEach(child => { arr.push(child.val()); });
                arr.sort((a,b) => b.pts - a.pts || a.fecha - b.fecha);
                document.getElementById("lista-ranking").innerHTML = arr.map((r, i) => 
                    `<tr><td>${i+1}</td><td>${r.nombre}</td><td>${r.pts}</td></tr>`).join("");
            });
        }
    });
</script>
</body>
</html>
