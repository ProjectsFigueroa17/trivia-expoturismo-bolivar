<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia IUTIRLA: Tesoros de Bolívar</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primario: #005f73;
            --secundario: #418d2b;
            --acento: #f1b92c;
            --fondo: #c3262f;
            --texto: #001219;
            --error: #e74c3c;
            --exito: #2ecc71;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--fondo);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        
        .cintillo-universidad {
            width: 100%;
            max-width: 650px;
            margin-bottom: 20px;
            text-align: center;
        }

        .cintillo-universidad img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
        }

        
        #quiz-container {
            background: white;
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }

        .contenedor-imagen {
            width: 100%;
            height: 220px;
            background-color: #f0f0f0;
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            border: 3px solid var(--primario);
        }

        .img-trivia { width: 100%; height: 100%; object-fit: cover; }

        h1 { color: var(--primario); font-size: 1.6rem; margin: 0 0 15px 0; }
        
    
        .opcion {
            display: block; width: 100%; padding: 14px; margin: 10px 0;
            border: 2px solid #ddd; border-radius: 10px;
            background: white; cursor: pointer; font-size: 1rem;
            transition: all 0.2s ease; text-align: left; font-weight: 500;
            box-sizing: border-box;
        }

        .correcto { background-color: var(--exito) !important; color: white !important; border-color: #27ae60 !important; }
        .incorrecto { background-color: var(--error) !important; color: white !important; border-color: #c0392b !important; }

        .btn-accion {
            padding: 12px 25px; background-color: var(--acento);
            color: white; border: none; border-radius: 30px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin: 5px;
        }

        input[type="text"] {
            padding: 12px; width: 90%; border-radius: 10px;
            border: 2px solid var(--primario); margin-bottom: 20px; font-size: 1rem;
            box-sizing: border-box;
        }

        
        .tabla-contenedor {
            max-height: 280px;
            overflow-y: auto;
            margin-top: 15px;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .tabla-ranking { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .tabla-ranking th, .tabla-ranking td { padding: 10px; border-bottom: 1px solid #ddd; }
        .tabla-ranking th { background: var(--primario); color: white; position: sticky; top: 0; }

        .oculto { display: none; }
        .progreso { color: #e20093; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        .bloqueado { pointer-events: none; }
    </style>
</head>
<body>

<div class="cintillo-universidad">
    <img src="iutirla.jpg" alt="Logo Universidad IUTIRLA" onerror="this.style.display='none'">
</div>

<div id="quiz-container">
    <div id="pantalla-inicio">
        <h1>🏔️ Trivia Bolívar</h1>
        <div class="contenedor-imagen">
            <img src="portada.jpg" class="img-trivia" onerror="this.src='https://via.placeholder.com/400x220?text=Tesoros+de+Bolivar'">
        </div>
        <p>Ingresa tu nombre para competir:</p>
        <input type="text" id="nombre-usuario" placeholder="Nombre y Apellido">
        <br>
        <button class="btn-accion" onclick="empezarJuego()">¡Comenzar!</button>
    </div>

    <div id="juego" class="oculto">
        <p class="progreso" id="num-pregunta"></p>
        <div class="contenedor-imagen" id="contenedor-foto"></div>
        <h2 id="enunciado" style="font-size: 1.1rem; margin-bottom: 1.2rem;"></h2>
        <div id="opciones-lista"></div>
    </div>

    <div id="pantalla-final" class="oculto">
        <h2>¡Recorrido Finalizado! 🏁</h2>
        <p id="resultado-final" style="font-size: 1.8rem; font-weight: bold; color: var(--primario);"></p>
        <h3>🏆 Ranking Global (Top 100)</h3>
        <div class="tabla-contenedor">
            <table class="tabla-ranking">
                <thead><tr><th>Pos</th><th>Nombre</th><th>Pts</th></tr></thead>
                <tbody id="lista-ranking"></tbody>
            </table>
        </div>
        <br>
        <button class="btn-accion" onclick="location.reload()">Jugar de nuevo</button>
    </div>
</div>

<script>
    
    const firebaseConfig = {
        apiKey: "AIzaSyCyRgck7A2wAoWEd8WrkI1HUOv4rjubSWo",
        authDomain: "trivia-bolivar.firebaseapp.com",
        projectId: "trivia-bolivar",
        storageBucket: "trivia-bolivar.firebasestorage.app",
        messagingSenderId: "1046239380884",
        appId: "1:1046239380884:web:596a91edb4f22358957b81",
        measurementId: "G-BLZDKKT4WR"
    };
    
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    
    const preguntas = [
        { q: "¿Cuál es la caída de agua más alta del mundo ubicada en Canaima?", options: ["Salto Kukenán", "Salto Ángel", "Salto La Llovizna"], correct: 1, img: "angel.jpg" },
        { q: "¿En qué ciudad se encuentra el imponente Parque Cachamay?", options: ["Ciudad Bolívar", "Upata", "Ciudad Guayana"], correct: 2, img: "cachamay.jpg" },
        { q: "¿Qué tepuy es famoso por ser llamado 'El Mundo Perdido'?", options: ["Monte Roraima", "Cerro Autana", "Auyantepui"], correct: 0, img: "roraima.jpg" },
        { q: "¿Qué fortificaciones coloniales protegen la entrada por el río Orinoco?", options: ["Castillo de San Carlos", "Castillos de Guayana", "Fortín Solano"], correct: 1, img: "castillos.jpg" },
        { q: "¿Cómo se llama la unión de los ríos Orinoco y Caroní?", options: ["El Abrazo de los Ríos", "Boca de Serpiente", "Confluencia Caroní-Orinoco"], correct: 2, img: "confluencia.jpg" },
        { q: "¿Cuál es el pez emblemático que tiene su feria en Ciudad Bolívar?", options: ["Curbina", "Sapoara", "Bocachico"], correct: 1, img: "sapoara.jpg" },
        { q: "¿Qué artista cinético tiene un museo en Ciudad Bolívar?", options: ["Carlos Cruz-Diez", "Alejandro Otero", "Jesús Soto"], correct: 2, img: "soto.jpg" },
        { q: "¿Cómo se llama el puente que cruza el Orinoco en Ciudad Bolívar?", options: ["Puente Angostura", "Puente Orinoquia", "Puente Rafael Urdaneta"], correct: 0, img: "puente.jpg" },
        { q: "¿En qué población se celebran los carnavales Patrimonio de la Humanidad?", options: ["Guasipati", "Tumeremo", "El Callao"], correct: 2, img: "callao.jpg" },
        { q: "¿Cuál es el fruto seco típico con el que se hacen turrones?", options: ["Maní", "Merey", "Nuez de Barinas"], correct: 1, img: "merey.jpg" },
        { q: "¿Qué lugar de la Gran Sabana tiene piso de piedra roja?", options: ["Quebrada del Jaspe", "Salto Aponguao", "Velo de la Novia"], correct: 0, img: "jaspe.jpg" },
        { q: "¿Cómo se llama la central hidroeléctrica más grande de Venezuela?", options: ["Macagua", "Guri", "Caruachi"], correct: 1, img: "guri.jpg" },
        { q: "¿Qué etnia indígena habita principalmente en Canaima?", options: ["Pemón", "Yanomami", "Warao"], correct: 0, img: "pemon.jpg" },
        { q: "¿En qué casa histórica se redactó el Discurso de Angostura?", options: ["Casa de las Doce Ventanas", "Congreso de Angostura", "Casa San Isidro"], correct: 1, img: "congreso.jpg" },
        { q: "¿Qué dulce tradicional se prepara con yuca y papelón?", options: ["Naiboa", "Majarete", "Jalea de Mango"], correct: 0, img: "naiboa.jpg" },
        { q: "¿En qué parque se encuentra el Salto La Llovizna?", options: ["Parque Cachamay", "Parque La Llovizna", "Parque Loefling"], correct: 1, img: "llovizna.jpg" },
        { q: "¿Qué CC tiene forma de pirámide en Pto. Ordaz?", options: ["Orinokia Mall", "CC Altavista", "Babilonia"], correct: 0, img: "orinokia.jpg" },
        { q: "¿Cuál es el museo interactivo junto a Central Macagua?", options: ["Museo Jesús Soto", "Ecomuseo del Caroní", "Museo de Guayana"], correct: 1, img: "ecomuseo.jpg" },
        { q: "¿En qué sector de San Félix fue la batalla del Cerro Chirica?", options: ["Dalla Costa", "El Roble", "Chirica"], correct: 2, img: "chirica.jpg" },
        { q: "¿Qué parque de Pto. Ordaz es un zoológico de fauna regional?", options: ["Parque La Navidad", "Parque Loefling", "Parque La Fundación"], correct: 1, img: "loefling.jpg" }
    ];

    let indiceActual = 0;
    let puntaje = 0;
    let usuarioActual = "";

    function empezarJuego() {
        usuarioActual = document.getElementById("nombre-usuario").value.trim();
        if (usuarioActual === "") { alert("Por favor, ingresa tu nombre"); return; }
        document.getElementById("pantalla-inicio").classList.add("oculto");
        document.getElementById("juego").classList.remove("oculto");
        cargarPregunta();
    }

    function cargarPregunta() {
        const p = preguntas[indiceActual];
        document.getElementById("num-pregunta").innerText = `Pregunta ${indiceActual + 1} de ${preguntas.length}`;
        document.getElementById("enunciado").innerText = p.q;
        document.getElementById("contenedor-foto").innerHTML = `<img src="${p.img}" class="img-trivia" onerror="this.src='https://via.placeholder.com/400x220?text=${p.img}'">`;
        
        const lista = document.getElementById("opciones-lista");
        lista.innerHTML = "";
        lista.classList.remove("bloqueado");

        p.options.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.innerText = opt;
            btn.className = "opcion";
            btn.onclick = () => verificarRespuesta(i, p.correct, btn);
            lista.appendChild(btn);
        });
    }

    function verificarRespuesta(seleccionado, correcto, boton) {
        const lista = document.getElementById("opciones-lista");
        lista.classList.add("bloqueado");

        if (seleccionado === correcto) {
            boton.classList.add("correcto");
            puntaje++;
        } else {
            boton.classList.add("incorrecto");
            const botones = lista.getElementsByTagName("button");
            botones[correcto].classList.add("correcto");
        }

        setTimeout(() => {
            indiceActual++;
            if (indiceActual < preguntas.length) {
                cargarPregunta();
            } else {
                mostrarResultado();
            }
        }, 800);
    }

    function mostrarResultado() {
        document.getElementById("juego").classList.add("oculto");
        document.getElementById("pantalla-final").classList.remove("oculto");
        const puntosFinales = puntaje * 100;
        document.getElementById("resultado-final").innerText = puntosFinales + " Pts";

        
        database.ref('ranking').push({
            nombre: usuarioActual,
            pts: puntosFinales,
            fecha: Date.now()
        });

        actualizarRankingVisual();
    }

    function actualizarRankingVisual() {
        
        database.ref('ranking').orderByChild('pts').limitToLast(100).on('value', (snapshot) => {
            let datos = [];
            snapshot.forEach((child) => {
                datos.push(child.val());
            });
            datos.reverse(); 

            const tabla = document.getElementById("lista-ranking");
            tabla.innerHTML = datos.map((r, i) => `
                <tr>
                    <td>${i+1}</td>
                    <td>${r.nombre}</td>
                    <td>${r.pts}</td>
                </tr>`).join("");
        });
    }
</script>
</body>
</html>
