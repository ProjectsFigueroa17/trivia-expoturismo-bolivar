<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trivia IUTIRLA: Expo Turismo Bolívar</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primario: #005f73;
            --acento: #f1b92c;
            --fondo: #c3262f;
            --exito: #2ecc71;
            --error: #e74c3c;
            --oro: #ffd700;
            --plata: #c0c0c0;
            --bronce: #cd7f32;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fondo);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box;
        }

        .cintillo { width: 100%; max-width: 500px; margin-bottom: 15px; text-align: center; }
        .cintillo img { max-width: 90%; height: auto; border-radius: 8px; }

        #quiz-container {
            background: white; padding: 1.2rem; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 450px; width: 100%; text-align: center; box-sizing: border-box;
        }

        .contenedor-imagen {
            width: 100%; height: 180px; background: #eee;
            border-radius: 12px; margin-bottom: 12px; overflow: hidden;
            border: 3px solid var(--primario); display: flex; align-items: center; justify-content: center;
        }

        .img-trivia { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: var(--primario); font-size: 1.5rem; margin: 0 0 10px 0; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; line-height: 1.3; }
        
        .opcion {
            display: block; width: 100%; padding: 12px; margin: 8px 0;
            border: 2px solid #eee; border-radius: 10px;
            background: #f9f9f9; cursor: pointer; font-size: 0.95rem;
            transition: 0.2s; text-align: left; font-weight: 600; box-sizing: border-box;
        }

        .correcto { background-color: var(--exito) !important; color: white; border-color: #27ae60; }
        .incorrecto { background-color: var(--error) !important; color: white; border-color: #c0392b; }

        .btn-accion {
            padding: 12px 30px; background: var(--acento);
            color: white; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            width: 100%; max-width: 250px;
        }

        input {
            padding: 12px; width: 100%; border-radius: 10px;
            border: 2px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem;
        }

        .tabla-contenedor {
            margin-top: 10px; border-radius: 8px; border: 1px solid #eee; overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primario); color: white; padding: 10px; font-size: 0.9rem; }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; font-weight: bold; }
        
        /* Colores para el Top 3 */
        tr:nth-child(1) td:first-child { color: var(--oro); font-size: 1.2rem; }
        tr:nth-child(2) td:first-child { color: var(--plata); }
        tr:nth-child(3) td:first-child { color: var(--bronce); }

        .oculto { display: none; }
        .bloqueado { pointer-events: none; }
    </style>
</head>
<body>

<div class="cintillo"><img src="iutirla.png" alt="IUTIRLA" onerror="this.style.display='none'"></div>

<div id="quiz-container">
    <div id="pantalla-inicio">
        <h1>🏔️ Trivia Expo Turismo</h1>
        <div class="contenedor-imagen">
            <img src="portada.jpg" class="img-trivia" onerror="this.src='https://placehold.co/400x200?text=Turismo+Bolivar'">
        </div>
        <p>Ingresa tu nombre para comenzar:</p>
        <input type="text" id="nombre-usuario" placeholder="Nombre y Apellido">
        <button class="btn-accion" onclick="empezarJuego()">¡Comenzar!</button>
    </div>

    <div id="juego" class="oculto">
        <p id="num-pregunta" style="color:var(--primario); font-weight:bold; font-size: 0.8rem; margin:0;"></p>
        <div class="contenedor-imagen" id="contenedor-foto"></div>
        <h2 id="enunciado"></h2>
        <div id="opciones-lista"></div>
    </div>

    <div id="pantalla-final" class="oculto">
        <h3>🏆 Mejores Puntajes (Top 4)</h3>
        <p id="resultado-final" style="font-size: 1.5rem; color: var(--primario); font-weight: bold; margin: 5px 0;"></p>
        <div class="tabla-contenedor">
            <table>
                <thead><tr><th>#</th><th>Jugador</th><th>Pts</th></tr></thead>
                <tbody id="lista-ranking"></tbody>
            </table>
        </div>
        <br>
        <button class="btn-accion" onclick="location.reload()">Reiniciar Juego</button>
    </div>
</div>

<script>
    
    const firebaseConfig = {
        apiKey: "AIzaSyDmG0iaaNMiGCRNORW3cURMfBRo9VwGiP0",
        authDomain: "trivia-expoturismo-bolivar.firebaseapp.com",
        databaseURL: "https://trivia-expoturismo-bolivar-default-rtdb.firebaseio.com",
        projectId: "trivia-expoturismo-bolivar",
        storageBucket: "trivia-expoturismo-bolivar.firebasestorage.app",
        messagingSenderId: "40735671749",
        appId: "1:40735671749:web:ea17fd6110a3d3db2677ac",
        measurementId: "G-BNGZYLR38C"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const bancoPreguntas = [
        { q: "¿Cuál es la caída de agua más alta del mundo ubicada en Canaima?", options: ["Salto Kukenán", "Salto Ángel", "Salto La Llovizna"], correct: "Salto Ángel", img: "angel.jpg" },
        { q: "¿En qué ciudad se encuentra el Parque Cachamay?", options: ["Ciudad Bolívar", "Upata", "Ciudad Guayana"], correct: "Ciudad Guayana", img: "cachamay.jpg" },
        { q: "¿Qué tepuy es llamado 'El Mundo Perdido'?", options: ["Monte Roraima", "Cerro Autana", "Auyantepui"], correct: "Monte Roraima", img: "roraima.jpg" },
        { q: "¿Qué fortificaciones protegen la entrada por el río Orinoco?", options: ["Castillo de San Carlos", "Castillos de Guayana", "Fortín Solano"], correct: "Castillos de Guayana", img: "castillos.jpg" },
        { q: "¿Cómo se llama la unión de los ríos Orinoco y Caroní?", options: ["El Abrazo de los Ríos", "Boca de Serpiente", "Confluencia Caroní-Orinoco"], correct: "Confluencia Caroní-Orinoco", img: "confluencia.jpg" },
        { q: "¿Cuál es el pez emblemático de Ciudad Bolívar?", options: ["Curbina", "Sapoara", "Bocachico"], correct: "Sapoara", img: "sapoara.jpg" },
        { q: "¿Qué artista cinético tiene un museo en Ciudad Bolívar?", options: ["Carlos Cruz-Diez", "Alejandro Otero", "Jesús Soto"], correct: "Jesús Soto", img: "soto.jpg" },
        { q: "¿Cómo se llama el puente colgante sobre el Orinoco?", options: ["Puente Angostura", "Puente Orinoquia", "Puente Rafael Urdaneta"], correct: "Puente Angostura", img: "puente.jpg" },
        { q: "¿En qué población son famosos los carnavales?", options: ["Guasipati", "Tumeremo", "El Callao"], correct: "El Callao", img: "callao.jpg" },
        { q: "¿Cuál es el fruto seco típico del estado?", options: ["Maní", "Merey", "Almendra"], correct: "Merey", img: "merey.jpg" },
        { q: "¿Qué lugar tiene piso de piedra roja?", options: ["Quebrada del Jaspe", "Salto Aponguao", "Velo de la Novia"], correct: "Quebrada del Jaspe", img: "jaspe.jpg" },
        { q: "¿Cómo se llama la central hidroeléctrica del Guri?", options: ["Macagua", "Guri", "Caruachi"], correct: "Guri", img: "guri.jpg" },
        { q: "¿Qué etnia indígena habita en Canaima?", options: ["Pemón", "Yanomami", "Warao"], correct: "Pemón", img: "pemon.jpg" },
        { q: "¿Dónde se redactó el Discurso de Angostura?", options: ["Casa de las Doce Ventanas", "Congreso de Angostura", "Casa San Isidro"], correct: "Congreso de Angostura", img: "congreso.jpg" },
        { q: "¿Qué dulce se prepara con yuca y papelón?", options: ["Naiboa", "Majarete", "Jalea"], correct: "Naiboa", img: "naiboa.jpg" },
        { q: "¿En qué parque se encuentra este salto?", options: ["Parque Cachamay", "Parque La Llovizna", "Parque Loefling"], correct: "Parque La Llovizna", img: "llovizna.jpg" },
        { q: "¿Qué CC tiene forma de pirámide en Pto. Ordaz?", options: ["Orinokia Mall", "CC Altavista", "Babilonia"], correct: "Orinokia Mall", img: "orinokia.jpg" },
        { q: "¿Cuál es el museo interactivo junto a Central Macagua?", options: ["Museo Jesús Soto", "Ecomuseo del Caroní", "Museo de Guayana"], correct: "Ecomuseo del Caroní", img: "ecomuseo.jpg" },
        { q: "¿En qué sector de San Félix fue la batalla?", options: ["Dalla Costa", "El Roble", "Chirica"], correct: "Chirica", img: "chirica.jpg" },
        { q: "¿Qué parque es un zoológico de fauna regional?", options: ["Parque La Navidad", "Parque Loefling", "Parque La Fundación"], correct: "Parque Loefling", img: "loefling.jpg" }
    ];

    let preguntas = [];
    let indice = 0, puntaje = 0, nombre = "";

    function barajar(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function empezarJuego() {
        nombre = document.getElementById("nombre-usuario").value.trim();
        if (!nombre) return alert("¡Dinos tu nombre!");
        
        preguntas = barajar(bancoPreguntas);
        indice = 0; puntaje = 0;
        
        document.getElementById("pantalla-inicio").classList.add("oculto");
        document.getElementById("juego").classList.remove("oculto");
        mostrarPregunta();
    }

    function mostrarPregunta() {
        const p = preguntas[indice];
        document.getElementById("num-pregunta").innerText = `PREGUNTA ${indice + 1} / ${preguntas.length}`;
        document.getElementById("enunciado").innerText = p.q;
        document.getElementById("contenedor-foto").innerHTML = `<img src="${p.img}" class="img-trivia" onerror="this.src='https://placehold.co/400x200?text=${p.correct}'">`;
        
        const lista = document.getElementById("opciones-lista");
        lista.innerHTML = "";
        lista.classList.remove("bloqueado");

        const opcionesMezcladas = barajar(p.options);

        opcionesMezcladas.forEach((opt) => {
            const b = document.createElement("button");
            b.innerText = opt; b.className = "opcion";
            b.onclick = () => {
                lista.classList.add("bloqueado");
                if(opt === p.correct) { 
                    b.classList.add("correcto"); 
                    puntaje++; 
                } else { 
                    b.classList.add("incorrecto");
                    Array.from(lista.children).forEach(btn => {
                        if(btn.innerText === p.correct) btn.classList.add("correcto");
                    });
                }
                setTimeout(() => { 
                    indice++; 
                    (indice < preguntas.length) ? mostrarPregunta() : finalizar(); 
                }, 1000);
            };
            lista.appendChild(b);
        });
    }

    function finalizar() {
        document.getElementById("juego").classList.add("oculto");
        document.getElementById("pantalla-final").classList.remove("oculto");
        const total = puntaje * 100;
        document.getElementById("resultado-final").innerText = total + " Puntos";
        
        
        database.ref('ranking').push({ nombre, pts: total, fecha: Date.now() });
        
        cargarRanking();
    }

    function cargarRanking() {
        
        database.ref('ranking').orderByChild('pts').limitToLast(100).on('value', s => {
            let arr = []; 
            s.forEach(child => { arr.push(child.val()); });
            
            
            arr.sort((a,b) => b.pts - a.pts || a.fecha - b.fecha);
            
            
            const mejores4 = arr.slice(0, 4);
            
            document.getElementById("lista-ranking").innerHTML = mejores4.map((r, i) => {
                let medalla = i + 1;
                if(i === 0) medalla = "🥇";
                if(i === 1) medalla = "🥈";
                if(i === 2) medalla = "🥉";
                return `<tr><td>${medalla}</td><td>${r.nombre}</td><td>${r.pts}</td></tr>`;
            }).join("");
        });
    }
</script>
</body>
</html>
